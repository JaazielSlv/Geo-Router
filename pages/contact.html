<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-light bg-primary shadow-sm">
      <div class="container-fluid">
        <button class="btn btn-outline-light me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
          <svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' fill='currentColor' class='bi bi-list' viewBox='0 0 16 16'><path fill-rule='evenodd' d='M2.5 12a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11zm0-4a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11zm0-4a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11z'/></svg>
        </button>
        <span class="navbar-brand mb-0 h1 text-white">GeoRoute BR</span>
      </div>
    </nav>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasMenuLabel">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav flex-column">
          <li class="nav-item mb-2"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item mb-2"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item mb-2"><a class="nav-link" href="map.html">Mapa</a></li>
          <li class="nav-item mb-2"><a class="nav-link" href="search.html">Busca</a></li>
          <li class="nav-item mb-2"><a class="nav-link" href="as_detail.html">Detalhe AS</a></li>
          <li class="nav-item mb-2"><a class="nav-link" href="about.html">Sobre</a></li>
          <li class="nav-item mb-2"><a class="nav-link active text-primary fw-bold" href="contact.html">Contato</a></li>
        </ul>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <h2 class="display-5 mb-4">Fale Conosco</h2>
    <p class="mb-4">Tem alguma dúvida? Entre em contato conosco através do formulário abaixo.</p>
    <form class="mx-auto" style="max-width: 500px;">
      <div class="mb-3">
        <label for="name" class="form-label">Nome</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Mensagem</label>
        <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary d-flex align-items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-send me-2" viewBox="0 0 16 16">
          <path d="M15.964 0.686a.5.5 0 0 1 .036.707l-15 15a.5.5 0 0 1-.707-.707l15-15a.5.5 0 0 1 .707.707z"/>
          <path d="M6.5 10.5v3a.5.5 0 0 0 1 0v-3a.5.5 0 0 0-1 0z"/>
        </svg>
        <span>Enviar</span>
      </button>
    </form>
  </main>

  <footer class="bg-light border-top mt-auto py-3">
    <div class="container text-center text-muted small">
      &copy; 2026 GeoRoute BR. Todos os direitos reservados.
    </div>
  </footer>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
